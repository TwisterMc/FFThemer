name: Feature request
description: Suggest an improvement for FFThemer
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user problem or workflow gap are you trying to address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe workarounds or other approaches you considered.

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched for existing issues before creating this request.
          required: true